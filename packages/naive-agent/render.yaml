projects:
  - name: nathan5x-agents-workshop-naive
    environments:
      - name: production
        databases:
          - name: nathan5x-naive-agent-db
            plan: basic-256mb
            region: oregon
            postgresMajorVersion: "18"

        services:
          - type: web
            name: nathan5x-naive-agent
            runtime: node
            region: oregon
            plan: starter
            buildCommand: npm ci
            startCommand: npm run start --workspace @workshop/naive-agent
            healthCheckPath: /healthz
            envVars:
              - key: DATABASE_URL
                fromDatabase:
                  name: nathan5x-naive-agent-db
                  property: connectionString
              - key: ANTHROPIC_API_KEY
                sync: false
              - key: OPENAI_API_KEY
                sync: false
              - key: GITHUB_TOKEN
                sync: false
              - key: NODE_ENV
                value: production