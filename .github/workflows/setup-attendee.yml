name: Setup attendee Blueprint names

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    name: Namespace Render Blueprints
    runs-on: ubuntu-latest

    steps:
      - name: Refuse upstream main
        if: ${{ (github.repository_owner == 'render-lab' || github.repository_owner == 'render-examples') && github.ref_name == 'main' }}
        run: |
          echo "This setup workflow is for attendee forks."
          echo "Refusing to namespace Blueprints on ${GITHUB_REPOSITORY} main."
          exit 1

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Namespace Blueprint resources
        run: npm run setup

      - name: Commit namespaced Blueprints
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add packages/naive-agent/render.yaml packages/worker-agents/render.yaml packages/workflow-agents/render.yaml

          if git diff --cached --quiet; then
            echo "Blueprints are already namespaced for ${GITHUB_ACTOR}."
            exit 0
          fi

          git commit -m "Namespace Render resources for ${GITHUB_ACTOR}"
          git push
